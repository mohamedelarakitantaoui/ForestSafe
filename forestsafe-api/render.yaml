services:
  - type: web
    name: forestsafe-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
